name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: HF
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Install Hugging Face Hub
        run: pip install huggingface_hub

      # Cette étape configure Git pour utiliser votre token proprement
      - name: Authenticate with Hugging Face
        run: |
          huggingface-cli login --token ${{ secrets.HF_TOKEN }} --add-to-git-credential

      - name: Push Web Space
        run: |
          git push --force https://huggingface.co/spaces/MissawB/animetix-web HEAD:main
          
      - name: Push Brain Space
        run: |
          git push --force https://huggingface.co/spaces/MissawB/animetix-brain HEAD:main
