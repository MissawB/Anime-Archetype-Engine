name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: HF
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      # Déploiement du Visage (Django)
      - name: Push Web Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Utilisation de oauth2 comme nom d'utilisateur pour valider le token
          git push --force https://oauth2:$HF_TOKEN@huggingface.co/spaces/MissawB/animetix-web HEAD:main
          
      # Déploiement du Cerveau (FastAPI)
      - name: Push Brain Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://oauth2:$HF_TOKEN@huggingface.co/spaces/MissawB/animetix-brain HEAD:main
