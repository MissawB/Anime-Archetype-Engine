name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: HF
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi, create_repo
          import os
          
          api = HfApi()
          token = os.environ['HF_TOKEN']
          
          def sync_space(repo_id, ignore):
              print(f'🚀 Syncing {repo_id}...')
              # Crée le repo si absent
              create_repo(repo_id, token=token, repo_type='space', space_sdk='docker', exist_ok=True)
              
              # Upload
              api.upload_folder(
                  folder_path='.',
                  repo_id=repo_id,
                  repo_type='space',
                  token=token,
                  ignore_patterns=ignore
              )
              print(f'✅ {repo_id} synced!')

          # 1. Sync WEB (Django)
          sync_space('MissawB/animetix-web', ['.venv/*', '.env', 'data/artifacts/*.npy', 'data/models/*', 'data/raw/*', 'brain.py'])
          
          # 2. Sync BRAIN (FastAPI)
          sync_space('MissawB/animetix-brain', ['.venv/*', '.env', 'backend/*', 'data/raw/*', 'data/processed/*', '.github/*'])
          "
