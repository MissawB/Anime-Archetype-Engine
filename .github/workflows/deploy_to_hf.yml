name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: HF
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      # Configuration simplifiée avec la nouvelle commande 'hf'
      - name: Authenticate with Hugging Face
        run: |
          hf login --token ${{ secrets.HF_TOKEN }}

      - name: Push Web Space
        run: |
          git push --force https://huggingface.co/spaces/MissawB/animetix-web HEAD:main
          
      - name: Push Brain Space
        run: |
          git push --force https://huggingface.co/spaces/MissawB/animetix-brain HEAD:main
