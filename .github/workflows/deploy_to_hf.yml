name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: HF
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      # ÉTAPE DE DIAGNOSTIC : On vérifie que les fichiers sont là
      - name: List files for diagnostic
        run: |
          echo "🔍 Checking for JSON files..."
          ls -R data/artifacts/*.json || echo "⚠️ No JSON in artifacts"
          ls -R data/processed/*.json || echo "⚠️ No JSON in processed"

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi, create_repo
          import os
          import textwrap
          
          api = HfApi()
          token = os.environ['HF_TOKEN']

          def deploy_space(repo_id, docker_content, readme_content, ignore):
              print(f'🚀 Syncing {repo_id}...')
              create_repo(repo_id, token=token, repo_type='space', space_sdk='docker', exist_ok=True)
              
              docker_final = textwrap.dedent(docker_content).strip()
              readme_final = textwrap.dedent(readme_content).strip()

              # On upload tout le dossier
              api.upload_folder(
                  folder_path='.',
                  repo_id=repo_id,
                  repo_type='space',
                  token=token,
                  ignore_patterns=ignore + ['Dockerfile', 'README.md']
              )
              
              api.upload_file(path_or_fileobj=docker_final.encode(), path_in_repo='Dockerfile', repo_id=repo_id, repo_type='space', token=token)
              api.upload_file(path_or_fileobj=readme_final.encode(), path_in_repo='README.md', repo_id=repo_id, repo_type='space', token=token)
              print(f'✅ {repo_id} synced!')

          # --- CONFIG WEB ---
          web_docker = \"\"\"
          FROM python:3.11-slim
          ENV PYTHONDONTWRITEBYTECODE=1
          ENV PYTHONUNBUFFERED=1
          ENV PYTHONPATH='/app/backend:${PYTHONPATH}'
          WORKDIR /app
          RUN apt-get update && apt-get install -y --no-install-recommends curl && rm -rf /var/lib/apt/lists/*
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt gunicorn
          COPY . .
          # On s'assure que les dossiers existent
          RUN mkdir -p data/artifacts data/processed
          EXPOSE 7860
          CMD [\\\"gunicorn\\\", \\\"--bind\\\", \\\"0.0.0.0:7860\\\", \\\"--workers\\\", \\\"2\\\", \\\"--timeout\\\", \\\"120\\\", \\\"animetix_project.wsgi:application\\\"]
          \"\"\"
          
          web_readme = \"\"\"
          ---
          title: Animetix
          emoji: 🧩
          sdk: docker
          ---
          # 🧩 Animetix Web
          \"\"\"

          # --- CONFIG BRAIN ---
          brain_docker = \"\"\"
          FROM python:3.11-slim
          WORKDIR /app
          RUN pip install --no-cache-dir fastapi uvicorn numpy scikit-learn pydantic huggingface_hub
          COPY brain.py .
          COPY data/artifacts/ ./data/artifacts/
          EXPOSE 7860
          CMD [\\\"uvicorn\\\", \\\"brain:app\\\", \\\"--host\\\", \\\"0.0.0.0\\\", \\\"--port\\\", \\\"7860\\\"]
          \"\"\"
          
          brain_readme = \"\"\"
          ---
          title: Animetix Brain
          emoji: 🧠
          sdk: docker
          ---
          # 🧠 Animetix Brain API
          \"\"\"

          # EXÉCUTION
          deploy_space('MissawB/animetix-web', web_docker, web_readme, ['.venv/*', '.env', 'data/artifacts/*.npy', 'data/models/*', 'data/raw/*', 'brain.py', 'pipeline/*', '.github/*'])
          deploy_space('MissawB/animetix-brain', brain_docker, brain_readme, ['.venv/*', '.env', 'backend/*', 'data/raw/*', 'data/processed/*', '.github/*', 'pipeline/*'])
          "
